app:
  site_name: 研发协作平台              # 平台名称，显示在标题栏和导出文件中
  secret_key: dev-only-key          # 生产环境务必修改
  database_url: sqlite:///instance/reqsys.db   # 集中放在 instance/ 目录，不随代码覆盖
  session_timeout: 600              # 秒
  todo_keep_days: 7                 # 已完成 todo 保留天数
  overdue_warn_days: 1              # 结转N天标黄
  overdue_danger_days: 3            # 超期N天标红
  ai_input_max: 5000                # AI 解析输入最大字符
  ai_timeout: 120                   # AI 请求超时（秒）
  host: 0.0.0.0                     # 监听地址
  port: 5001                        # 监听端口
  mail_domain: company.com          # 邮箱域名，工号@域名

auth:
  sso_url: ""                       # 留空则跳过 SSO 跳转验证
  default_role: DE

roles:
  - { name: SE, desc: 软件工程师 }
  - { name: DE, desc: 开发工程师 }
  - { name: TE, desc: 测试工程师 }
  - { name: Committer, desc: 代码评审人 }
  - { name: MDE, desc: 模块架构工程师 }
  - { name: QA, desc: 质量管理 }
  - { name: SEC, desc: 秘书 }
  - { name: FO, desc: 功能负责人 }
  - { name: PM, desc: 项目经理 }
  - { name: PL, desc: 项目负责人, hidden: true }
  - { name: XM, desc: Scrum Master, hidden: true }
  - { name: HR, desc: 人力资源, hidden: true }
  - { name: LM, desc: 直线经理, hidden: true }
  - { name: Admin, desc: 系统管理员 }

# 隐藏角色(hidden: true)：注册/个人设置不可选，仅管理员在团队管理中分配
# PL/XM/HR 拥有团队管理页面访问权限

admin:
  employee_id: a00000001
  name: 管理员
  ip: ""

exchange:
  server: ""                        # Exchange 服务器地址，如 mail.company.com，留空禁用
  domain: ""                        # Windows 域名，如 CORP

ai:
  provider: ollama                  # ollama 或 openai

ollama:
  base_url: http://127.0.0.1:11434
  model: reqsys
  ssh_enabled: false                # 是否启用 SSH 隧道访问 Ollama
  ssh_host: ""                      # SSH 配置名称（如 ollama-server）
  ssh_local_port: 11434             # 本地转发端口

openai:
  base_url: ""                      # 公司 API 网关，如 https://api.company.com/v1
  api_key: ""                       # API Key
  model: gpt-4o-mini                # 模型名称
