services:
  web:
    build: .
    ports:
      - "5000:5000"
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "flask db upgrade &&
             python scripts/init_db.py &&
             flask run --host=0.0.0.0 --debug"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reqsysai
      POSTGRES_USER: reqsys
      POSTGRES_PASSWORD: ${DB_PASSWORD:-reqsys}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reqsys"]
      interval: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  pgdata:
  ollama_data:
