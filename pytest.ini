[pytest]
# 默认只跑 tests/test_*.py，排除 smoke_* 等外部依赖测试
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 自定义标记
markers =
    smoke: 烟测试，依赖外部服务（Ollama/API），不纳入回归
    slow: 慢速测试（>5s）
    ai: AI相关测试（JSON解析等），用 pytest -m ai 单独运行

# 默认排除 smoke 和 ai 标记的用例
addopts = -m "not smoke and not ai" --tb=short -q
