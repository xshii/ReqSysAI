{% extends "base.html" %}
{% block title %}吐槽墙 - {{ site_name }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4><i class="bi bi-chat-dots"></i> 匿名吐槽墙</h4>
    <a href="{{ url_for('incentive.index') }}" class="btn btn-sm btn-outline-secondary">返回激励专区</a>
</div>
<div class="alert alert-light small py-2 mb-3"><i class="bi bi-shield-check"></i> 完全匿名，不记录任何身份信息</div>

<div class="row">
    <div class="col-md-4">
        <div class="card mb-3">
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <textarea name="content" class="form-control mb-2" rows="3" maxlength="500" required placeholder="想说什么就说什么...（500字以内）"></textarea>
                    <button type="submit" class="btn btn-dark btn-sm w-100">匿名发布</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        {% for r in rants %}
        <div class="card mb-2 border-0 bg-light">
            <div class="card-body py-2 px-3">
                <p class="mb-1">{{ r.content }}</p>
                <div class="text-muted small">{{ r.created_at.strftime('%m-%d %H:%M') }}</div>
            </div>
        </div>
        {% else %}
        <div class="text-center text-muted py-4">还没有人吐槽</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
