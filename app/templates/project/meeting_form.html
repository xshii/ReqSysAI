{% extends "base.html" %}
{% block title %}新建会议纪要 · {{ project.name }} - {{ site_name }}{% endblock %}

{% block content %}
<div class="mb-3">
    <a href="{{ url_for('project.meeting_list', project_id=project.id) }}" class="text-decoration-none">
        <i class="bi bi-arrow-left"></i> 返回会议列表
    </a>
</div>

<h4 class="mb-3">新建会议纪要 · {{ project.name }}</h4>

<div class="card">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-2 mb-2">
                <div class="col-md-6">
                    <label class="form-label small mb-0">会议标题 <span class="text-danger">*</span></label>
                    <input type="text" name="title" class="form-control form-control-sm" required placeholder="例：第3周项目进度评审会">
                </div>
                <div class="col-md-3">
                    <label class="form-label small mb-0">会议日期</label>
                    <input type="date" max="2099-12-31" name="date" class="form-control form-control-sm" value="{{ today }}">
                </div>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-md-6">
                    <label class="form-label small mb-0">与会人</label>
                    <input type="hidden" name="attendees" id="attendeesVal">
                    <div class="border rounded p-1 d-flex flex-wrap gap-1 align-items-center tag-container" id="attendeeTags" style="min-height:32px;">
                        <input type="text" class="border-0 flex-grow-1 small tag-input" data-hidden="attendeesVal" placeholder="输入姓名搜索..." autocomplete="off" style="outline:none;min-width:80px;">
                    </div>
                    <div class="position-relative"><div class="tag-dropdown position-absolute bg-white border rounded shadow-sm w-100" style="z-index:1000;display:none;max-height:150px;overflow-y:auto;font-size:.85em;"></div></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label small mb-0">抄送人（选填）</label>
                    <input type="hidden" name="cc" id="ccVal">
                    <div class="border rounded p-1 d-flex flex-wrap gap-1 align-items-center tag-container" id="ccTags" style="min-height:32px;">
                        <input type="text" class="border-0 flex-grow-1 small tag-input" data-hidden="ccVal" placeholder="输入姓名搜索..." autocomplete="off" style="outline:none;min-width:80px;">
                    </div>
                    <div class="position-relative"><div class="tag-dropdown position-absolute bg-white border rounded shadow-sm w-100" style="z-index:1000;display:none;max-height:150px;overflow-y:auto;font-size:.85em;"></div></div>
                </div>
            </div>
            <div class="mb-2">
                <label class="form-label small mb-0">会议内容</label>
                <textarea name="content" class="form-control form-control-sm" rows="10" placeholder="粘贴或输入会议纪要内容..."></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary btn-sm">保存</button>
                <button type="submit" name="auto_extract" value="1" class="btn btn-outline-info btn-sm"><i class="bi bi-robot"></i> 保存并润色提取遗留问题</button>
                <a href="{{ url_for('project.meeting_list', project_id=project.id) }}" class="btn btn-outline-secondary btn-sm">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Reusable tag input with autocomplete + arrow key navigation
(function() {
    var _users = null;
    function loadUsers(cb) {
        if (_users) return cb(_users);
        fetch('/api/users').then(function(r) { return r.json(); }).then(function(d) { _users = d; cb(d); });
    }

    document.querySelectorAll('.tag-input').forEach(function(input) {
        var container = input.closest('.tag-container');
        var dropdown = container.parentElement.querySelector('.tag-dropdown');
        var hiddenId = input.dataset.hidden;
        var hiddenVal = document.getElementById(hiddenId);
        var selected = [];
        var hlIdx = -1; // highlighted index for arrow keys

        function sync() { hiddenVal.value = selected.join(','); }

        function addTag(name) {
            if (selected.indexOf(name) >= 0) return;
            selected.push(name);
            var tag = document.createElement('span');
            tag.className = 'badge bg-primary bg-opacity-75 d-flex align-items-center gap-1';
            tag.style.fontSize = '.8em';
            tag.textContent = name;
            var x = document.createElement('i');
            x.className = 'bi bi-x';
            x.style.cssText = 'cursor:pointer;font-size:.9em;';
            x.addEventListener('click', function() {
                selected = selected.filter(function(n) { return n !== name; });
                tag.remove(); sync();
            });
            tag.appendChild(x);
            container.insertBefore(tag, input);
            sync(); input.value = ''; dropdown.style.display = 'none'; hlIdx = -1;
        }

        function renderDropdown(items) {
            dropdown.innerHTML = items.map(function(item, i) {
                return '<div class="px-2 py-1' + (i === hlIdx ? ' bg-primary bg-opacity-10' : '') + '" style="cursor:pointer;" data-name="' + item.name + '">'
                    + item.label + '</div>';
            }).join('');
            dropdown.style.display = items.length ? 'block' : 'none';
            dropdown.querySelectorAll('[data-name]').forEach(function(opt) {
                opt.addEventListener('mousedown', function(e) { e.preventDefault(); addTag(opt.dataset.name); });
            });
        }

        var _items = [];
        input.addEventListener('input', function() {
            var q = input.value.trim().toLowerCase();
            hlIdx = -1;
            if (!q) { dropdown.style.display = 'none'; _items = []; return; }
            loadUsers(function(users) {
                _items = [];
                users.forEach(function(u) {
                    if (selected.indexOf(u.name) >= 0) return;
                    if (u.name.toLowerCase().includes(q) || (u.pinyin || '').toLowerCase().includes(q) || (u.employee_id || '').toLowerCase().includes(q)) {
                        _items.push({name: u.name, label: u.name + ' <span class="text-muted">' + (u.employee_id || '') + '</span>'});
                    }
                });
                if (!_items.length && q.length >= 2) {
                    _items.push({name: q, label: '<span class="text-muted">添加：' + q + '</span>'});
                }
                renderDropdown(_items);
            });
        });

        input.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (_items.length) { hlIdx = Math.min(hlIdx + 1, _items.length - 1); renderDropdown(_items); }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (_items.length) { hlIdx = Math.max(hlIdx - 1, 0); renderDropdown(_items); }
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (hlIdx >= 0 && hlIdx < _items.length) { addTag(_items[hlIdx].name); _items = []; }
                else { var v = input.value.trim(); if (v) addTag(v); }
            } else if (e.key === 'Backspace' && !input.value && selected.length) {
                selected.pop();
                var badges = container.querySelectorAll('.badge');
                if (badges.length) badges[badges.length - 1].remove();
                sync();
            }
        });

        input.addEventListener('blur', function() { setTimeout(function() { dropdown.style.display = 'none'; hlIdx = -1; }, 200); });
        container.addEventListener('click', function() { input.focus(); });

        // Pre-fill from hidden value
        (hiddenVal.value || '').split(',').forEach(function(n) { n = n.trim(); if (n) addTag(n); });
    });
})();
</script>
{% endblock %}
