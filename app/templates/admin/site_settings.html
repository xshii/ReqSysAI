{% extends "base.html" %}
{% block title %}后台管理 - 站点设置 - {{ site_name }}{% endblock %}

{% block content %}
{% include "admin/_tabs.html" %}

<div class="row g-3">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header py-2"><strong>站点名称</strong></div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('admin.site_settings_save') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">平台名称</label>
                        <input type="text" class="form-control" name="site_name"
                               value="{{ current_site_name }}" maxlength="50" required>
                        <div class="form-text">显示在浏览器标题栏、导出文件名等位置</div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm">保存</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-header py-2"><strong><i class="bi bi-calendar-week"></i> Exchange 日历同步</strong></div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('admin.exchange_settings_save') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-2">
                        <label class="form-label small mb-0">Exchange 服务器</label>
                        <input type="text" class="form-control form-control-sm" name="exchange_server"
                               value="{{ exchange_server }}" placeholder="如 mail.company.com">
                        <div class="form-text">留空则禁用 Exchange 同步功能</div>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small mb-0">Windows 域名</label>
                        <input type="text" class="form-control form-control-sm" name="exchange_domain"
                               value="{{ exchange_domain }}" placeholder="如 CORP">
                    </div>
                    <div class="mb-2">
                        <label class="form-label small mb-0">允许的邮箱后缀</label>
                        <input type="text" class="form-control form-control-sm" name="mail_domain"
                               value="{{ mail_domain }}" placeholder="如 company.com">
                        <div class="form-text">用户设置邮箱时必须以 @此后缀 结尾</div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm">保存</button>
                    {% if exchange_server %}
                    <span class="badge bg-success ms-2"><i class="bi bi-check-circle"></i> 已配置</span>
                    {% else %}
                    <span class="badge bg-secondary ms-2">未配置</span>
                    {% endif %}
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
