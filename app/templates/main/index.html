{% extends "base.html" %}

{% block title %}首页 - 研发协作平台{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4>欢迎, {{ current_user.display_name }}</h4>
    <span class="text-muted">{{ current_user.role.display_name }}</span>
</div>

<div class="row">
    <div class="col-md-4 mb-3">
        <div class="card border-primary">
            <div class="card-body text-center">
                <i class="bi bi-list-task text-primary" style="font-size: 2rem;"></i>
                <h5 class="mt-2">今日 Todo</h5>
                <p class="text-muted">管理今日工作任务</p>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-3">
        <div class="card border-success">
            <div class="card-body text-center">
                <i class="bi bi-chat-dots text-success" style="font-size: 2rem;"></i>
                <h5 class="mt-2">每日站会</h5>
                <p class="text-muted">填写站会记录</p>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-3">
        <div class="card border-info">
            <div class="card-body text-center">
                <i class="bi bi-clipboard-check text-info" style="font-size: 2rem;"></i>
                <h5 class="mt-2">需求列表</h5>
                <p class="text-muted">查看分配的需求</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
